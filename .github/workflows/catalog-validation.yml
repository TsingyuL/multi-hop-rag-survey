name: Validate survey catalog

on:
  pull_request:
    paths:
      - "taxonomy/**"
      - "docs/data/**"
      - "scripts/build_catalog_site.py"
      - "scripts/validate_catalog.py"
      - ".github/workflows/catalog-validation.yml"
  push:
    branches: [main]
    paths:
      - "taxonomy/**"
      - "docs/data/**"
      - "scripts/build_catalog_site.py"
      - "scripts/validate_catalog.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/validate_catalog.py
      - run: python scripts/build_catalog_site.py
      - run: git diff --exit-code -- docs/data
